apiVersion: v1
kind: Service
metadata:
  name: geth-utpl
  namespace: utpl
spec:
  type: NodePort
  selector:
    app: geth-utpl
  ports:
    - name: rpc
      port: 8545
      targetPort: 8545
    - name: p2p-tcp
      port: 30303
      targetPort: 30303
      nodePort: 30311
      protocol: TCP
    - name: p2p-udp
      port: 30303
      targetPort: 30303
      nodePort: 30311
      protocol: UDP
