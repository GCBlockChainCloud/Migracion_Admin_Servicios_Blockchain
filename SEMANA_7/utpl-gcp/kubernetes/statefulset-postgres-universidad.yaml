apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-universidad
  namespace: utpl
spec:
  serviceName: postgres-universidad
  replicas: 1
  selector:
    matchLabels:
      app: postgres-universidad
  template:
    metadata:
      labels:
        app: postgres-universidad
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: api-universidad-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: api-universidad-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-universidad-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-universidad-data
