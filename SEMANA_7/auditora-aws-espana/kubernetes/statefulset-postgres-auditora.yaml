apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-auditora
  namespace: auditora
spec:
  serviceName: postgres-auditora
  replicas: 1
  selector:
    matchLabels:
      app: postgres-auditora
  template:
    metadata:
      labels:
        app: postgres-auditora
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: api-auditora-secret
                  key: POSTGRES_AUDITORA_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: api-auditora-secret
                  key: POSTGRES_AUDITORA_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-auditora-secret
                  key: POSTGRES_AUDITORA_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-auditora-data
