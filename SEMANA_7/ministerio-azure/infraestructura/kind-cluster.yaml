kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    image: kindest/node:v1.30.13
    extraPortMappings:
      - containerPort: 30312
        hostPort: 30312
        protocol: TCP
      - containerPort: 30312
        hostPort: 30312
        protocol: UDP
  - role: worker
    image: kindest/node:v1.30.13
