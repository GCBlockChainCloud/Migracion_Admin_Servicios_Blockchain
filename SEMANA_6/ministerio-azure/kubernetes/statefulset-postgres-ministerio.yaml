apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-ministerio
  namespace: ministerio
spec:
  serviceName: postgres-ministerio
  replicas: 1
  selector:
    matchLabels:
      app: postgres-ministerio
  template:
    metadata:
      labels:
        app: postgres-ministerio
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: api-ministerio-secret
                  key: POSTGRES_MINISTERIO_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: api-ministerio-secret
                  key: POSTGRES_MINISTERIO_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-ministerio-secret
                  key: POSTGRES_MINISTERIO_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-ministerio-data
